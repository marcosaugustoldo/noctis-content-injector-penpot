<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Noctis Content Injector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --r:8px;--rs:8px;--rl:8px;--t:180ms ease;
  --accent:#ecdb9f;
  --font:"JetBrains Mono",ui-monospace,monospace;
  --bg:#1f1f1f;
  --glass:rgba(255,255,255,.04);--glass-h:rgba(255,255,255,.07);--glass-a:rgba(255,255,255,.10);
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.14);--blur:40px;
  --shadow:0 1px 20px rgba(0,0,0,.4),0 0 1px rgba(255,255,255,.06);
  --t1:#d4d4d4;--t2:rgba(212,212,212,.5);--t3:rgba(212,212,212,.25);
  --field:rgba(255,255,255,.04);--field-b:rgba(255,255,255,.06);--div:rgba(255,255,255,.05);
  --ok-bg:rgba(255,255,255,.05);--ok-t:rgba(212,212,212,.6);
  --err-bg:rgba(255,80,60,.1);--err-t:#FF6961;
  --warn-bg:rgba(236,219,159,.08);--warn-t:#ecdb9f;
  --mesh1:rgba(236,219,159,.06);--mesh2:rgba(236,219,159,.03);--mesh3:rgba(236,219,159,.04);
  --grad-border:linear-gradient(135deg,rgba(236,219,159,.18),rgba(236,219,159,.02),rgba(236,219,159,.01),rgba(236,219,159,.12));
  --bd-bg:rgba(0,0,0,.15)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:400 13px/1.5 var(--font);color:var(--t1);background:var(--bg);overflow-y:auto;-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(600px 400px at 25% 15%,var(--mesh1),transparent),radial-gradient(500px 350px at 75% 35%,var(--mesh2),transparent),radial-gradient(400px 300px at 50% 75%,var(--mesh3),transparent);pointer-events:none;z-index:0}
html,body{height:100%}
.w{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:14px 12px 24px}

/* GLASS CARD */
.gc{position:relative;background:var(--glass);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border-radius:var(--rl);box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden}
.gc::before{content:'';position:absolute;inset:0;border-radius:var(--rl);padding:1px;background:var(--grad-border);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}

/* HEADER */
.hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;margin-bottom:10px}
.hd-l{display:flex;flex-direction:column;gap:1px}
.logo{font-size:22px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:10px}
.logo-a{color:var(--accent)}
.ver{position:relative;font-size:11px;font-weight:700;color:var(--accent);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:3px 8px;border-radius:7px;letter-spacing:.3px;overflow:hidden}
.ver::before{content:'';position:absolute;inset:0;border-radius:6px;padding:1px;background:linear-gradient(135deg,rgba(236,219,159,.4),rgba(236,219,159,.02),rgba(236,219,159,.01),rgba(236,219,159,.3));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.hd-sub{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.2px}
.hd-r{display:flex;align-items:center;gap:5px}

/* ICON BUTTON — nerd font glyph inside */
.ib{width:30px;height:30px;border-radius:10px;border:1px solid var(--border-h);background:var(--glass);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);font-size:15px;line-height:1;font-family:var(--font)}
.ib:hover{background:var(--glass-h);border-color:var(--accent);color:var(--accent)}

/* STATUS */
.st{padding:8px 14px;border-radius:var(--rs);font-size:11px;font-weight:600;margin-bottom:10px;display:none}
.st.ok{display:flex;align-items:center;gap:10px;background:var(--ok-bg);color:var(--ok-t);border:1px solid var(--border)}
.st.warn{display:flex;align-items:center;gap:10px;background:var(--warn-bg);color:var(--warn-t);border:1px solid rgba(236,219,159,.08)}
.st-tx{flex-shrink:0;white-space:nowrap}
.ts{display:flex;gap:3px;overflow-x:auto;flex:1;scrollbar-width:none;mask-image:linear-gradient(to right,black 90%,transparent);-webkit-mask-image:linear-gradient(to right,black 90%,transparent)}
.ts::-webkit-scrollbar{display:none}
.ti{width:26px;height:26px;border-radius:5px;flex-shrink:0;border:1px solid var(--border);overflow:hidden;background:var(--glass)}
.ti img{width:100%;height:100%;object-fit:cover;display:block}

/* SECTION HEADERS */
.sh{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;background:transparent;border:none;width:100%;text-align:left;color:var(--t1);font:600 13px var(--font);transition:background var(--t);position:relative;z-index:2}
.sh:hover{background:var(--glass-h)}
/* section icon — nerd font glyph */
.si{width:20px;height:20px;flex-shrink:0;color:var(--t3);font-size:16px;line-height:20px;text-align:center;font-family:var(--font)}
/* chevron — nerd font */
.sv{margin-left:auto;color:var(--t3);font-size:13px;font-family:var(--font);transition:transform .3s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.sh.active .sv{transform:rotate(90deg)}
.sb{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.sx{padding:0 16px 14px;border-top:1px solid var(--div)}

/* INPUTS */
textarea{width:100%;min-height:90px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--field-b);background:var(--field);color:var(--t1);font:400 12px/1.6 var(--font);resize:vertical;outline:none;transition:border-color var(--t);margin-top:10px}
textarea:focus{border-color:rgba(236,219,159,.3);box-shadow:0 0 0 2px rgba(236,219,159,.06)}
textarea::placeholder{color:var(--t3)}

/* BUTTONS */
.br{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.bt{height:34px;padding:0 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--t1);font:600 12px var(--font);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all var(--t);position:relative}
.bt:hover:not(:disabled){background:var(--glass-h);border-color:var(--border-h)}
.bt:active:not(:disabled){transform:scale(.97)}
.bt:disabled{opacity:.3;cursor:not-allowed}
.bt-p{background:rgba(236,219,159,.12);border-color:rgba(236,219,159,.2);color:var(--accent)}
.bt-p:hover:not(:disabled){background:rgba(236,219,159,.18);border-color:rgba(236,219,159,.3)}
.bt.loading .lt{visibility:hidden}
.bt.loading::after{content:'';position:absolute;width:12px;height:12px;border:1.5px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ch{height:26px;padding:0 9px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--t3);font:600 10.5px var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all var(--t)}
.ch:hover{background:var(--glass-h);color:var(--t2);border-color:var(--border-h)}

/* BANNERS */
.bn{display:none;margin-top:8px;padding:8px 12px;border-radius:var(--rs);font-size:11px;line-height:1.5;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.bn.success{background:var(--ok-bg);color:var(--ok-t);border:1px solid var(--border)}
.bn.error{background:var(--err-bg);color:var(--err-t);border:1px solid rgba(255,60,48,.1)}
.bn.warn{background:var(--warn-bg);color:var(--warn-t);border:1px solid rgba(236,219,159,.08)}

/* DROPZONE */
.dz{border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;text-align:center;margin-top:10px;background:var(--glass);transition:all .2s ease;cursor:pointer}
.dz:hover{border-color:var(--border-h);background:var(--glass-h)}
.dz.hover{border-color:var(--accent);background:rgba(236,219,159,.04)}
.dz-i{color:var(--t3);margin-bottom:4px;font-size:24px;font-family:var(--font);line-height:1}
.dz-t{font-weight:600;font-size:12px;color:var(--t2)}
.dz-s{font-size:10px;color:var(--t3);margin-top:2px}

/* IMAGE GRID */
.mh{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.mc{font-size:11px;font-weight:600;color:var(--t3)}
.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:8px}
.ig-i{position:relative;aspect-ratio:1;border-radius:var(--rs);overflow:hidden;cursor:grab;border:1.5px solid var(--border);transition:all .15s ease;background:var(--glass)}
.ig-i:hover{border-color:var(--border-h)}
.ig-i.dragging{opacity:.25;transform:scale(.92)}
.ig-i.drag-over{border-color:var(--accent);box-shadow:0 0 8px rgba(236,219,159,.1)}
.ig-i img{width:100%;height:100%;object-fit:cover;display:block}
.ig-n{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:rgba(255,255,255,.85);font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;min-width:16px;text-align:center;font-family:var(--font)}
.ig-x{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.45);border:none;color:rgba(255,255,255,.7);font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s ease}
.ig-i:hover .ig-x{opacity:1}

/* PALETTE */
.pc{display:flex;flex-direction:column;gap:4px;margin-top:10px}
.pr{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--r);border:1.5px solid var(--border);cursor:pointer;transition:all var(--t)}
.pr:hover{border-color:var(--border-h);background:var(--glass)}
.pr.sel{border-color:var(--accent);background:rgba(236,219,159,.04)}
.pn{font-weight:600;font-size:11.5px}
.ps{display:flex;gap:4px}
.pw{width:18px;height:18px;border-radius:50%;border:1px solid var(--border)}
.pa{display:flex;gap:2px}
.pb{background:none;border:none;padding:3px;cursor:pointer;color:var(--t3);border-radius:5px;display:flex;transition:all var(--t);font-size:12px;font-family:var(--font);align-items:center}
.pb:hover{color:var(--t1);background:var(--glass-h)}
.pb svg{width:12px;height:12px;fill:currentColor}
.pr.em{grid-template-columns:1fr;gap:8px;cursor:default;border-color:var(--accent);padding:12px;background:var(--glass)}
.ef{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.ef .ps input[type="color"]{width:20px;height:20px;padding:0;border:1px solid var(--border);border-radius:50%;cursor:pointer;background:transparent}
.ef input[type="text"]{height:28px;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:var(--field);color:var(--t1);font:500 11.5px var(--font);outline:none}
.ea{display:flex;gap:6px;justify-content:flex-end}

/* MAGIC */
.magic{margin-top:8px;display:flex;align-items:center;gap:8px}
.magic .bt{flex:1;height:34px;font-size:11.5px}
.magic-bn{font-size:10.5px;color:var(--ok-t);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;opacity:1;transition:opacity .3s ease}
.bt-g{background:rgba(52,199,89,.12);border-color:rgba(52,199,89,.22);color:#34C759}
.bt-g:hover:not(:disabled){background:rgba(52,199,89,.2);border-color:rgba(52,199,89,.35)}
.bt-g.loading::after{border-top-color:#34C759}

/* NOCTIS CTA */
.gc-bd{position:relative;background:var(--bd-bg);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border-radius:var(--rl);box-shadow:var(--shadow);margin-top:16px;overflow:hidden}
.gc-bd::before{content:'';position:absolute;inset:0;border-radius:var(--rl);padding:1px;background:var(--grad-border);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}
.bd-inner{padding:18px 20px 20px;border-top:1px solid var(--div)}
.bd-text{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:16px;font-weight:400;text-align:center}
.bd-text span{color:var(--accent);font-weight:700}
.bd-cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px 0;border-radius:12px;background:linear-gradient(135deg,var(--accent),#c9b870);color:#1f1f1f;font:700 12px var(--font);text-decoration:none;transition:all .25s ease;border:none;cursor:pointer;box-shadow:0 2px 16px rgba(236,219,159,.18);letter-spacing:-.1px}
.bd-cta:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(236,219,159,.28)}
.bd-cta-icon{font-size:15px;font-family:var(--font)}

/* PROFILE */
.pf-row{display:flex;align-items:center;gap:12px;margin-top:8px}
.pf-avatar{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;transition:all var(--t);font-size:22px;font-family:var(--font);color:var(--t3)}
.pf-avatar:hover{border-color:var(--border-h);background:var(--glass-h)}
.pf-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.pf-fields{flex:1;display:flex;flex-direction:column;gap:6px}
.pf-input{height:34px;padding:0 12px;border:1px solid var(--field-b);border-radius:var(--rs);background:var(--field);color:var(--t1);font:500 12px var(--font);outline:none;transition:border-color var(--t);width:100%}
.pf-input:focus{border-color:rgba(236,219,159,.3)}
.pf-input::placeholder{color:var(--t3)}
.pf-hint{font-size:9px;color:var(--t3);margin-top:6px;display:block;letter-spacing:.2px}

.ft{text-align:center;font-size:8.5px;color:var(--t3);margin-top:14px;padding-bottom:10px;letter-spacing:.3px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="w">

  <!-- HEADER -->
  <header class="gc hd">
    <div class="hd-l">
      <div class="logo"><span>Noctis</span><span class="logo-a">Injector</span><span class="ver">v1.0</span></div>
      <span class="hd-sub">Content Injector · Noctis®</span>
    </div>
    <div class="hd-r">
      <!-- suporte: abre e-mail -->
      <button id="supportBtn" class="ib" title="Suporte">󰇮</button>
    </div>
  </header>

  <div id="statusBar" class="st">
    <span id="statusText" class="st-tx"></span>
    <div id="thumbStrip" class="ts"></div>
  </div>

  <!-- CABEÇALHO / PERFIL -->
  <div class="gc">
    <button class="sh">
      <span class="si">󰀄</span>
      <span>Cabeçalho</span>
      <span class="sv">󰅂</span>
    </button>
    <div class="sb"><div class="sx">
      <div class="pf-row">
        <div id="avatarPreview" class="pf-avatar" title="Clique para trocar foto">󰋦</div>
        <div class="pf-fields">
          <input id="profileHandle" type="text" class="pf-input" placeholder="@perfil"/>
          <input id="profileName"   type="text" class="pf-input" placeholder="Nome e Sobrenome"/>
        </div>
      </div>
      <span class="pf-hint">Foto → camada "Foto Perfil" · @ → "Perfil" · Nome → "Nome"</span>
      <input id="avatarInput" type="file" accept="image/png,image/jpeg,image/webp" style="display:none"/>
      <div class="br">
        <button id="btnProfile" class="bt bt-p" disabled><span class="lt">󰄬 Aplicar</span></button>
      </div>
      <div id="bannerProfile" class="bn"></div>
    </div></div>
  </div>

  <!-- TEXTOS -->
  <div class="gc">
    <button class="sh">
      <span class="si">󰉿</span>
      <span>Textos</span>
      <span class="sv">󰅂</span>
    </button>
    <div class="sb"><div class="sx">
      <textarea id="txt" placeholder="texto 1 - Título&#10;texto 2 - Corpo&#10;texto 3 - Apoio"></textarea>
      <div class="br">
        <button id="btnContent" class="bt bt-p" disabled><span class="lt">󰄬 Aplicar</span></button>
      </div>
      <div id="bannerContent" class="bn"></div>
    </div></div>
  </div>

  <!-- IMAGENS -->
  <div class="gc">
    <button class="sh">
      <span class="si">󰋩</span>
      <span>Imagens</span>
      <span class="sv">󰅂</span>
    </button>
    <div class="sb"><div class="sx">
      <div id="dropZone" class="dz">
        <div class="dz-i">󰉼</div>
        <div class="dz-t">Arraste ou clique</div>
        <div class="dz-s">PNG, JPG, WebP</div>
      </div>
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/avif" multiple style="display:none"/>
      <div id="mapWrap" style="display:none">
        <div class="mh">
          <span id="mapCount" class="mc"></span>
          <button id="clearListBtn" class="ch">󰆴 Limpar</button>
        </div>
        <div id="imgGrid" class="ig"></div>
        <div class="br" style="justify-content:flex-end">
          <button id="applyLocalBtn" class="bt bt-p"><span class="lt">󰄬 Aplicar</span></button>
        </div>
      </div>
      <div id="bannerImages" class="bn"></div>
    </div></div>
  </div>

  <!-- CORES -->
  <div class="gc">
    <button class="sh">
      <span class="si">󰏘</span>
      <span>Cores</span>
      <span class="sv">󰅂</span>
    </button>
    <div class="sb"><div class="sx">
      <div id="paletteContainer" class="pc"></div>
      <div class="br" style="gap:4px">
        <button id="createNewPaletteBtn" class="ch" style="flex:1;justify-content:center;height:28px">󰐕 Nova Paleta</button>
        <button id="extractPaletteBtn"  class="ch" style="flex:1;justify-content:center;height:28px">󱓞 Extrair do Frame</button>
      </div>
      <div class="br">
        <button id="btnApplyColors" class="bt bt-p" disabled><span class="lt">󰄬 Aplicar</span></button>
      </div>
      <div id="bannerColors" class="bn"></div>
    </div></div>
  </div>

  <!-- MAGIC -->
  <div class="magic" style="margin-top:10px">
    <button id="btnMagic" class="bt bt-g" disabled>
      <span class="lt">󱐋 Aplicar Tudo</span>
    </button>
    <span id="magicStatus" class="magic-bn" style="display:none"></span>
  </div>

  <!-- NOCTIS CTA -->
  <div class="gc-bd">
    <button class="sh">
      <span class="si">󰋲</span>
      <span>Conheça a Noctis</span>
      <span class="sv">󰅂</span>
    </button>
    <div class="sb"><div class="bd-inner">
      <div class="bd-text">
        Copy estratégico para especialistas em saúde.<br>
        <span>Diagnóstico. Posicionamento. Resultado.</span>
      </div>
      <a class="bd-cta" href="https://www.instagram.com/noctis_copywriting/" target="_blank">
        <span class="bd-cta-icon">󰋾</span> Seguir no Instagram
      </a>
    </div></div>
  </div>

  <div class="ft">Noctis Content Injector v1.0 · Noctis® · 2026</div>
</div>

<script>
(function(){
var $=function(id){return document.getElementById(id)};
var txt=$('txt'),
    btnContent=$('btnContent'),bannerContent=$('bannerContent'),
    bannerImages=$('bannerImages'),bannerColors=$('bannerColors'),
    dropZone=$('dropZone'),fileInput=$('fileInput'),
    mapWrap=$('mapWrap'),imgGrid=$('imgGrid'),mapCount=$('mapCount'),
    applyLocalBtn=$('applyLocalBtn'),clearListBtn=$('clearListBtn'),
    statusBar=$('statusBar'),statusText=$('statusText'),thumbStrip=$('thumbStrip'),
    supportBtn=$('supportBtn'),
    btnApplyColors=$('btnApplyColors'),paletteContainer=$('paletteContainer'),
    createNewPaletteBtn=$('createNewPaletteBtn'),extractPaletteBtn=$('extractPaletteBtn'),
    btnMagic=$('btnMagic'),magicStatus=$('magicStatus'),
    profileHandle=$('profileHandle'),profileName=$('profileName'),
    avatarPreview=$('avatarPreview'),avatarInput=$('avatarInput'),
    btnProfile=$('btnProfile'),bannerProfile=$('bannerProfile');

var localImages=[],availableImageTargets={},availableFrames=[],
    frameCount=0,userPalettes=[],bannerTimers={},profileAvatarData=null;

/* ---- UTILS ---- */
function showBanner(k,t,m,tgt,autoHide){
  var b=tgt||bannerImages;
  b.className='bn '+(k||'');b.style.display='block';
  b.innerHTML='<b>'+(t||'')+'</b>'+(m?' — '+m:'');
  var p=b.closest('.sb');
  if(p&&p.style.maxHeight!=='0px')p.style.maxHeight=p.scrollHeight+'px';
  if(autoHide){
    if(bannerTimers[b.id])clearTimeout(bannerTimers[b.id]);
    bannerTimers[b.id]=setTimeout(function(){b.style.display='none'},4000)
  }
}
function setL(b,v){if(!b)return;if(v){b.classList.add('loading');b.disabled=true}else b.classList.remove('loading')}

function updateUI(d){
  frameCount=d.frameCount;availableFrames=d.frameData||[];availableImageTargets=d.imageTargets||{};
  if(!frameCount){
    statusBar.className='st warn';
    statusText.textContent='Selecione boards para começar';
    thumbStrip.innerHTML='';
  } else {
    statusBar.className='st ok';
    statusText.textContent=frameCount+' slide(s)';
  }
  document.querySelectorAll('.bt').forEach(function(b){
    if(b.id!=='createNewPaletteBtn'&&b.id!=='extractPaletteBtn')b.disabled=!frameCount
  });
  var v=txt.value||'',ok=v.trim()===''||/texto\s*\d+\s*-\s*.+/i.test(v);
  btnContent.disabled=!frameCount||!ok||v.trim()==='';
  btnProfile.disabled=!frameCount||(!profileHandle.value.trim()&&!profileName.value.trim()&&!profileAvatarData);
  if(localImages.length>0)autoMap();
  renderMap();
}

/* ---- PALETTES ---- */
function savePalettes(){parent.postMessage({pluginMessage:{type:'save-user-palettes',palettes:userPalettes}},'*')}
function renderPalettes(){
  paletteContainer.innerHTML='';
  var sel=paletteContainer.dataset.selectedId;
  userPalettes.forEach(function(p){
    var row=document.createElement('div');
    row.className='pr'+(String(p.id)===sel?' sel':'');
    row.dataset.id=p.id;row.dataset.colors=p.colors.join(',');
    var sw=p.colors.map(function(c){return'<div class="pw" style="background:'+c+'"></div>'}).join('');
    var del=p.isDeletable?'<button class="pb del" title="Excluir">󰆴</button>':'';
    row.innerHTML='<span class="pn">'+p.name+'</span><div class="ps">'+sw+'</div><div class="pa"><button class="pb edt" title="Editar">󰏫</button>'+del+'</div>';
    paletteContainer.appendChild(row)
  });
  var panel=paletteContainer.closest('.sb');
  if(panel&&panel.style.maxHeight&&panel.style.maxHeight!=='0px')panel.style.maxHeight=panel.scrollHeight+'px';
}
function renderEdit(row){
  var id=row.dataset.id;
  var pal=userPalettes.find(function(p){return String(p.id)===id});
  if(!pal)return;
  paletteContainer.querySelectorAll('.pr').forEach(function(r){r.classList.remove('sel')});
  row.classList.add('em');
  row.innerHTML='<div class="ef"><input type="text" class="eni" value="'+pal.name+'" placeholder="Nome"><div class="ps"><input type="color" value="'+pal.colors[0]+'"><input type="color" value="'+pal.colors[1]+'"><input type="color" value="'+pal.colors[2]+'"></div></div><div class="ea"><button class="ch ceb">Cancelar</button><button class="ch seb" style="border-color:var(--accent);color:var(--accent)">Salvar</button></div>';
  row.querySelector('.seb').onclick=function(){
    pal.name=row.querySelector('.eni').value||'Paleta';
    pal.colors=Array.from(row.querySelectorAll('input[type="color"]')).map(function(i){return i.value});
    savePalettes();paletteContainer.dataset.selectedId=id;renderPalettes()
  };
  row.querySelector('.ceb').onclick=function(){paletteContainer.dataset.selectedId=id;renderPalettes()}
}

/* ---- IMAGE HANDLING ---- */
function resizeIfNeeded(dataUrl,maxDim){
  return new Promise(function(res){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w<=maxDim&&h<=maxDim){res(dataUrl);return}
      var scale=Math.min(maxDim/w,maxDim/h);
      var nw=Math.round(w*scale),nh=Math.round(h*scale);
      var c=document.createElement('canvas');c.width=nw;c.height=nh;
      c.getContext('2d').drawImage(img,0,0,nw,nh);res(c.toDataURL('image/png'))
    };img.src=dataUrl
  })
}
function processFile(file){
  return new Promise(function(res,rej){
    var r=new FileReader();r.onerror=rej;
    r.onload=function(e){
      var url=e.target.result;
      var convert=function(src){resizeIfNeeded(src,2048).then(function(finalUrl){res({name:file.name.replace(/\.[^/.]+$/,'')+'.png',previewDataUrl:finalUrl})})};
      if(file.type.startsWith('image/webp')||file.type.startsWith('image/avif')){
        var img=new Image();
        img.onload=function(){var c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);convert(c.toDataURL('image/png'))};
        img.onerror=rej;img.src=url
      } else convert(url)
    };r.readAsDataURL(file)
  })
}
function autoMap(){
  var slots=[];
  Object.keys(availableImageTargets).sort(function(a,b){return a-b}).forEach(function(s){
    availableImageTargets[s].forEach(function(t){slots.push({slide:parseInt(s,10),target:t})})
  });
  localImages.forEach(function(img,i){
    if(slots[i]){img.slide=slots[i].slide;img.target=slots[i].target}
    else{img.slide=null;img.target=null}
  })
}
var dsi=null;
function renderMap(){
  if(!localImages.length){mapWrap.style.display='none';return}
  mapWrap.style.display='block';imgGrid.innerHTML='';
  mapCount.textContent=localImages.length+' arquivo(s)';
  localImages.forEach(function(img,ix){
    var c=document.createElement('div');c.className='ig-i';c.draggable=true;
    c.innerHTML='<img src="'+img.previewDataUrl+'" alt=""><span class="ig-n">'+(ix+1)+'</span><button class="ig-x">✕</button>';
    c.querySelector('.ig-x').onclick=function(e){e.stopPropagation();localImages.splice(ix,1);autoMap();renderMap()};
    c.addEventListener('dragstart',function(e){dsi=ix;c.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    c.addEventListener('dragend',function(){c.classList.remove('dragging');document.querySelectorAll('.ig-i').forEach(function(x){x.classList.remove('drag-over')})});
    c.addEventListener('dragover',function(e){e.preventDefault();c.classList.add('drag-over')});
    c.addEventListener('dragleave',function(){c.classList.remove('drag-over')});
    c.addEventListener('drop',function(e){e.preventDefault();c.classList.remove('drag-over');if(dsi!==null&&dsi!==ix){var tmp=localImages[dsi];localImages[dsi]=localImages[ix];localImages[ix]=tmp;autoMap();renderMap()}});
    imgGrid.appendChild(c)
  });
  var p=mapWrap.closest('.sb');
  if(p&&p.style.maxHeight&&p.style.maxHeight!=='0px')p.style.maxHeight=p.scrollHeight+'px';
}
function handleFiles(f){
  Promise.all(Array.from(f).map(processFile))
    .then(function(imgs){localImages=imgs.reverse().concat(localImages);autoMap();renderMap()})
    .catch(function(){showBanner('error','Erro','Use JPG, PNG ou WebP.',bannerImages)})
}
function buildPayload(){
  return localImages.map(function(img){
    if(!img.previewDataUrl||!img.previewDataUrl.includes(','))return null;
    return{slide:img.slide||0,target:img.target||'',b64:img.previewDataUrl.split(',')[1]}
  }).filter(function(x){return x&&x.slide>0&&x.target!==''&&x.b64})
}

/* ---- EVENT HANDLERS ---- */
supportBtn.onclick=function(){window.location.href='mailto:contato@noctis.icu'};

txt.addEventListener('input',function(){
  var v=txt.value||'',ok=v.trim()===''||/texto\s*\d+\s*-\s*.+/i.test(v);
  btnContent.disabled=!frameCount||!ok||v.trim()===''
});
btnContent.onclick=function(){setL(this,true);parent.postMessage({pluginMessage:{type:'apply-content',content:txt.value}},'*')};

avatarPreview.onclick=function(){avatarInput.click()};
avatarInput.onchange=function(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    resizeIfNeeded(ev.target.result,512).then(function(finalUrl){
      profileAvatarData=finalUrl;
      avatarPreview.innerHTML='<img src="'+profileAvatarData+'">';
      btnProfile.disabled=!frameCount;
      var p=avatarPreview.closest('.sb');
      if(p&&p.style.maxHeight&&p.style.maxHeight!=='0px')p.style.maxHeight=p.scrollHeight+'px'
    })
  };r.readAsDataURL(f)
};
function checkProfileBtn(){btnProfile.disabled=!frameCount||(!profileHandle.value.trim()&&!profileName.value.trim()&&!profileAvatarData)}
profileHandle.addEventListener('input',checkProfileBtn);
profileName.addEventListener('input',checkProfileBtn);
btnProfile.onclick=function(){
  setL(this,true);
  var payload={type:'apply-profile',handle:profileHandle.value.trim()||null,name:profileName.value.trim()||null,avatarB64:null};
  if(profileAvatarData&&profileAvatarData.includes(','))payload.avatarB64=profileAvatarData.split(',')[1];
  parent.postMessage({pluginMessage:payload},'*')
};

applyLocalBtn.onclick=function(){setL(this,true);parent.postMessage({pluginMessage:{type:'apply-local-images',images:buildPayload()}},'*')};
clearListBtn.onclick=function(){localImages=[];renderMap()};
dropZone.onclick=function(){fileInput.click()};
fileInput.onchange=function(e){handleFiles(e.target.files)};
['dragover','dragenter'].forEach(function(ev){dropZone.addEventListener(ev,function(e){e.preventDefault();e.stopPropagation();dropZone.classList.add('hover')})});
['dragleave','dragend','drop'].forEach(function(ev){dropZone.addEventListener(ev,function(e){e.preventDefault();e.stopPropagation();dropZone.classList.remove('hover')})});
dropZone.addEventListener('drop',function(e){e.preventDefault();e.stopPropagation();handleFiles(e.dataTransfer.files)});

paletteContainer.addEventListener('click',function(e){
  var row=e.target.closest('.pr');
  if(!row||row.classList.contains('em')){
    if(!row){paletteContainer.querySelectorAll('.pr').forEach(function(r){r.classList.remove('sel')});delete paletteContainer.dataset.selectedId}
    return
  }
  if(e.target.closest('.edt'))renderEdit(row);
  else if(e.target.closest('.del')){userPalettes=userPalettes.filter(function(p){return String(p.id)!==row.dataset.id});savePalettes();renderPalettes()}
  else{
    if(row.classList.contains('sel')){row.classList.remove('sel');delete paletteContainer.dataset.selectedId}
    else{paletteContainer.querySelectorAll('.pr').forEach(function(r){r.classList.remove('sel')});row.classList.add('sel');paletteContainer.dataset.selectedId=row.dataset.id}
  }
});
createNewPaletteBtn.onclick=function(){
  var np={id:Date.now(),name:'Nova Paleta',colors:['#f5f5f5','#808080','#1e1e1e'],isDeletable:true};
  userPalettes.push(np);savePalettes();renderPalettes();
  var nr=paletteContainer.querySelector('.pr[data-id="'+np.id+'"]');if(nr)renderEdit(nr)
};
extractPaletteBtn.onclick=function(){parent.postMessage({pluginMessage:{type:'extract-palette'}},'*')};
btnApplyColors.onclick=function(){
  setL(this,true);
  var sr=paletteContainer.querySelector('.pr.sel');
  if(!sr){showBanner('warn','Aviso','Selecione uma paleta.',bannerColors);setL(this,false);btnApplyColors.disabled=!frameCount;return}
  parent.postMessage({pluginMessage:{type:'apply-colors',colors:sr.dataset.colors.split(',')}},'*')
};

btnMagic.onclick=function(){
  setL(this,true);
  var colors=null,sr=paletteContainer.querySelector('.pr.sel');
  if(sr)colors=sr.dataset.colors.split(',');
  var avatarB64=null;
  if(profileAvatarData&&profileAvatarData.includes(','))avatarB64=profileAvatarData.split(',')[1];
  parent.postMessage({pluginMessage:{type:'magic-apply',textContent:txt.value||'',images:buildPayload(),colors:colors,profileHandle:profileHandle.value.trim()||null,profileName:profileName.value.trim()||null,avatarB64:avatarB64}},'*')
};

document.querySelectorAll('.sh').forEach(function(h){
  h.addEventListener('click',function(){
    h.classList.toggle('active');
    var p=h.nextElementSibling;
    if(p.style.maxHeight&&p.style.maxHeight!=='0px')p.style.maxHeight=null;
    else p.style.maxHeight=p.scrollHeight+'px'
  })
});

/* ---- MESSAGE HANDLER ---- */
onmessage=function(event){
  var msg=event.data.pluginMessage;if(!msg)return;
  var re=function(b){setL(b,false);b.disabled=!frameCount};

  if(msg.type==='init'){updateUI(msg.selectionData);userPalettes=msg.userPalettes||[];renderPalettes()}
  if(msg.type==='selection-update')updateUI(msg.data);
  if(msg.type==='thumbnails-update'){
    thumbStrip.innerHTML='';
    if(msg.thumbnails&&msg.thumbnails.length>0){
      msg.thumbnails.forEach(function(t){
        if(!t.bytes)return;
        var d=document.createElement('div');d.className='ti';
        var img=document.createElement('img');
        img.src=URL.createObjectURL(new Blob([new Uint8Array(t.bytes)],{type:'image/png'}));
        img.title='Slide '+t.index;d.appendChild(img);thumbStrip.appendChild(d)
      })
    }
  }
  if(msg.type==='applied-content-result'){
    re(btnContent);
    var rp=msg.report,sm='',im='';
    if(rp.textsApplied>0)sm=rp.textsApplied+' texto(s) aplicado(s).';
    if(rp.issues.length>0)im=rp.issues.map(function(i){return i.msg}).join('<br>');
    var kind=(rp.textsApplied>0&&!rp.issues.length)?'success':'warn';
    if(!rp.textsApplied&&!rp.issues.length)im='Nenhum texto aplicado.';
    showBanner(kind,kind==='success'?'✓':'Aviso',[sm,im].filter(Boolean).join('<br>'),bannerContent,true)
  }
  if(msg.type==='applied-images'){
    re(applyLocalBtn);var rp=msg.report;var cnt=rp.imagesApplied||0;
    if(cnt>0&&rp.ok)showBanner('success','✓',cnt+' imagem(ns) aplicada(s).',bannerImages,true);
    else if(rp.issues.length>0)showBanner('error','Erro',rp.issues.map(function(i){return i.msg}).join('<br>'),bannerImages,true);
    else showBanner('warn','Aviso','Nenhuma imagem aplicada. Verifique o mapeamento.',bannerImages,true)
  }
  if(msg.type==='applied-colors-result'){
    re(btnApplyColors);var r=msg.report;
    if(r.ok&&r.nodesChanged>0)showBanner('success','✓','Cores em '+r.nodesChanged+' camada(s).',bannerColors,true);
    else showBanner(r.issues.length?'error':'warn','Aviso',r.issues.map(function(i){return i.msg}).join('<br>')||'Nenhuma cor aplicada.',bannerColors,true)
  }
  if(msg.type==='extract-palette-result'){
    if(msg.colors&&msg.colors.length>=3){
      var np={id:Date.now(),name:'Extraída',colors:msg.colors.slice(0,3),isDeletable:true};
      userPalettes.push(np);savePalettes();paletteContainer.dataset.selectedId=String(np.id);renderPalettes();
      showBanner('success','✓','Paleta extraída do frame.',bannerColors,true)
    } else showBanner('warn','Aviso','Não encontrei cores suficientes.',bannerColors,true)
  }
  if(msg.type==='magic-apply-result'){
    re(btnMagic);var rp=msg.report;var parts=[];
    if(rp.textsApplied>0)parts.push(rp.textsApplied+' texto(s)');
    if(rp.imagesApplied>0)parts.push(rp.imagesApplied+' img');
    if(rp.colorsChanged>0)parts.push(rp.colorsChanged+' cor');
    if(rp.profileApplied>0)parts.push('perfil');
    if(parts.length){
      magicStatus.textContent='✓ '+parts.join(' + ');magicStatus.style.display='inline';
      setTimeout(function(){magicStatus.style.opacity='0';setTimeout(function(){magicStatus.style.display='none';magicStatus.style.opacity='1'},400)},3500)
    } else {
      magicStatus.textContent='Nada aplicado';magicStatus.style.display='inline';
      setTimeout(function(){magicStatus.style.display='none'},3000)
    }
  }
  if(msg.type==='applied-profile-result'){
    re(btnProfile);var rp=msg.report;var parts=[];
    if(rp.namesChanged>0)parts.push(rp.namesChanged+' nome(s)');
    if(rp.avatarsChanged>0)parts.push(rp.avatarsChanged+' foto(s)');
    showBanner(rp.ok?'success':'warn',rp.ok?'✓':'Aviso',parts.join(' + ')||(rp.issues.length?rp.issues.map(function(i){return i.msg}).join('<br>'):'Nada aplicado.'),bannerProfile,true)
  }
  if(msg.type==='error-general')showBanner('error','Erro',msg.message,bannerContent)
};

parent.postMessage({pluginMessage:{type:'ui-ready'}},'*');
})();
</script>
